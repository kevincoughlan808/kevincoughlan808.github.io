---
layout: default
---

<article class="post">
  <header class="post-header">
    <div class="post-meta">
      <span class="post-date">{{ page.date | date: "%b %-d, %Y" }}</span>
      {% if page.category %}
        <span class="post-tag {{ page.category | slugify }}">{{ page.category }}</span>
      {% endif %}
    </div>
    <h1 class="post-title">{{ page.title }}</h1>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
  <div class="post-back">
    <a href="{{ '/' | relative_url }}">&larr; All posts</a>
  </div>
</article>
